<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Saksham Nirula · A World Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="space"></canvas>

  <!-- ===== INTRO ===== -->
  <section id="intro">
    <div class="intro-inner">
      <div id="typed" class="typed"></div>
      <button id="launch" class="launch">LAUNCH <span class="bz">▸</span></button>
      <div id="introHint" class="hint">drag to orbit · scroll to zoom · click a planet to explore</div>
    </div>
  </section>

  <!-- ===== HUD (minimal, 3D-first) ===== -->
  <div id="hud" class="hidden">
    <div class="hud-tl">
      <div class="hud-name">SAKSHAM NIRULA</div>
      <div class="hud-loc" id="focusName">SYSTEM VIEW</div>
    </div>

    <button id="backBtn" class="back hidden">◂ SYSTEM</button>

    <nav id="planetNav"></nav>

    <div class="hud-hint" id="hudHint">drag to orbit · scroll to zoom · click a planet</div>
  </div>

  <div id="tip"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
